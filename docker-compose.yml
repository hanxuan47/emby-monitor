services:
  emby-monitor:
    build: https://github.com/hanxuan47/emby-monitor.git
    container_name: emby-monitor
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      # 🔑 加密密钥（强烈建议设置固定密钥，防止数据迁移后无法解密）
      # 生成命令: docker compose run --rm emby-monitor python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
      # - ENCRYPTION_KEY=your-base64-key-here
