services:
  emby-monitor:
    build: .
    container_name: emby-monitor
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      # 🔑 加密密钥（强烈建议设置固定密钥，防止数据迁移后无法解密）
      # 生成命令见 README.md
      # - ENCRYPTION_KEY=your-base64-key-here
