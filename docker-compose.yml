version: "3.8"

services:
  emby-monitor:
    build: .
    container_name: emby-monitor
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      # ── 加密密钥（可选，强烈推荐） ────────────────────────
      # 如果不设置，系统会在首次启动时自动生成密钥保存在 ./data/.encryption_key
      # 设置固定密钥可以确保数据库备份后可还原（密钥不会丢失）
      # 生成命令: docker compose run --rm emby-monitor python -c "
      #   import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())
      # "
      # - ENCRYPTION_KEY=your-base64-44-char-key-here
